<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hopewell Health | Unified System</title>
    <style>
        :root { 
            --primary: #1a237e; 
            --secondary: #00796b;
            --accent: #ff6f00;
            --bg: #f8f9fa; 
            --white: #ffffff;
            --border: #dfe1e5;
            --text-muted: #70757a;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: #202124; 
            overflow-x: hidden;
        }

        /* Navbar */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 0.6rem 1.2rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { font-size: 1.5rem; cursor: pointer; padding: 5px; }
        .logo-tag { background: white; color: var(--primary); padding: 2px 8px; border-radius: 4px; font-weight: 800; }

        /* Drawer Navigation */
        .drawer {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: var(--white);
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            z-index: 1100;
            overflow-y: auto;
        }
        .drawer.open { left: 0; }
        .drawer-section { padding: 1rem 1.5rem; border-bottom: 1px solid #f1f1f1; }
        .drawer-section h4 { margin: 0 0 10px 0; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .drawer ul { list-style: none; padding: 0; margin: 0; }
        .drawer li { padding: 0.8rem 0; cursor: pointer; transition: 0.2s; }
        .drawer li:hover { color: var(--secondary); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1050; }
        .overlay.show { display: block; }

        /* VIEWS */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Home/Search View */
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }
        .search-logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 25px; }
        .search-box-wrapper { width: 100%; max-width: 584px; position: relative; }
        .search-bar {
            width: 100%; height: 46px; padding: 0 45px 0 20px;
            border: 1px solid var(--border); border-radius: 24px;
            font-size: 16px; outline: none; box-sizing: border-box;
        }
        .search-bar:focus { box-shadow: 0 1px 6px rgba(32,33,36,0.28); }
        
        .recent-searches { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .recent-item { 
            background: #e8f0fe; color: #1a73e8; padding: 5px 12px; 
            border-radius: 16px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .close-x { cursor: pointer; font-weight: bold; }

        /* Dashboard/Card View */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 20px; }
        .card { 
            background: white; border-radius: 12px; padding: 1.5rem; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 5px solid var(--secondary);
        }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .status-badge { font-size: 0.75rem; background: #fff3cd; color: #856404; padding: 2px 8px; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-alt { background: #f0f2f5; color: var(--text-muted); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="drawer" id="drawer">
        <div class="drawer-section">
            <h4>Main</h4>
            <ul>
                <li onclick="switchView('home-view')">🏠 Home</li>
                <li onclick="switchView('doctor-view', 'My Appointments')">👨‍⚕️ My Appointments</li>
                <li onclick="switchView('history-view', 'Recent History')">📜 History Records</li>
            </ul>
        </div>
        <div class="drawer-section">
            <h4>Admin / Departments</h4>
            <ul id="dept-list"></ul>
        </div>
    </nav>

    <header>
        <div class="header-left">
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            <div class="logo-tag">H</div>
            <span>Hopewell Health</span>
        </div>
        <div style="font-size: 0.8rem; text-align: right;">
            <strong>Dr. Smith</strong><br><span class="status-badge" style="background:var(--accent); color:white">Admin</span>
        </div>
    </header>

    <!-- VIEW: HOME (SEARCH) -->
    <main id="home-view" class="view active">
        <div class="search-container">
            <div class="search-logo">Hopewell Search</div>
            <div class="search-box-wrapper">
                <input type="text" class="search-bar" id="search-input" placeholder="Search Patients or Departments..." onkeypress="handleSearch(event)">
            </div>
            <div class="recent-searches" id="recent-list"></div>
        </div>
    </main>

    <!-- VIEW: DOCTOR DASHBOARD / DEPT VIEW -->
    <main id="doctor-view" class="view">
        <h2 id="view-title">My Appointments</h2>
        <div class="grid" id="appointment-grid"></div>
    </main>

    <!-- VIEW: HISTORY -->
    <main id="history-view" class="view">
        <h2>Clinical History Logs</h2>
        <div class="grid" id="history-grid"></div>
    </main>

    <script>
        const departments = ["General Medicine", "Pediatrics", "Orthopedics", "Cardiology", "Neurology", "Oncology"];
        const patients = [
            { id: "P-101", name: "Anjali Rao", dept: "Cardiology", time: "09:00 AM", age: 45, diagnosis: "Atrial fibrillation", history: ["2025: Echo", "2026: ECG"] },
            { id: "P-102", name: "Vikram Reddy", dept: "Cardiology", time: "09:30 AM", age: 32, diagnosis: "Chest Pain", history: ["2026: Stress Test"] },
            { id: "P-103", name: "Suresh Khanna", dept: "Orthopedics", time: "10:15 AM", age: 58, diagnosis: "Knee Pain", history: ["2025: X-Ray"] }
        ];
        let recentSearches = ['Anjali Rao', 'Cardiology'];

        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function switchView(viewId, title = "") {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(title) document.getElementById('view-title').innerText = title;
            
            if(viewId === 'doctor-view') renderAppointments(title.includes('My') ? 'Cardiology' : title);
            if(viewId === 'history-view') renderHistory();
            
            if(document.getElementById('drawer').classList.contains('open')) toggleMenu();
        }

        function renderAppointments(dept) {
            const grid = document.getElementById('appointment-grid');
            const filtered = patients.filter(p => p.dept === dept || dept === 'My Appointments');
            grid.innerHTML = filtered.map(p => `
                <div class="card">
                    <div class="card-header">
                        <strong>${p.name}</strong>
                        <span class="status-badge">${p.time}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#555">Reason: ${p.diagnosis}</p>
                    <div class="btn-group">
                        <button class="btn btn-primary">Start Visit</button>
                        <button class="btn btn-alt">Details</button>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const grid = document.getElementById('history-grid');
            grid.innerHTML = patients.map(p => `
                <div class="card" style="border-left-color: #607d8b">
                    <strong>${p.name}</strong>
                    <ul style="font-size:0.8rem; padding-left:15px">
                        ${p.history.map(h => `<li>${h}</li>`).join('')}
                    </ul>
                    <button class="btn btn-alt" style="width:100%">Download Records</button>
                </div>
            `).join('');
        }

        function handleSearch(e) {
            if(e.key === 'Enter') {
                const val = e.target.value.trim();
                if(val) {
                    if(!recentSearches.includes(val)) recentSearches.unshift(val);
                    renderRecent();
                    switchView('doctor-view', 'Search: ' + val);
                }
                e.target.value = '';
            }
        }

        function renderRecent() {
            const list = document.getElementById('recent-list');
            list.innerHTML = recentSearches.slice(0, 5).map((item, i) => `
                <div class="recent-item">
                    ${item} <span class="close-x" onclick="event.stopPropagation(); recentSearches.splice(${i},1); renderRecent();">×</span>
                </div>
            `).join('');
        }

        window.onload = () => {
            const list = document.getElementById('dept-list');
            list.innerHTML = departments.map(d => `<li onclick="switchView('doctor-view', '${d}')">${d}</li>`).join('');
            renderRecent();
        };
    </script>
</body>
</html>
